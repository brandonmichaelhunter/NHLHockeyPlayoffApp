<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastAPI + HTMX</title>
  <script src="https://unpkg.com/htmx.org@2.0.0" integrity="sha384-wS5l5IKJBvK6sPTKa2WZ1js3d947pvWXbPJ1OmWfEuxLgeHcEbjUUA5i9V5ZkpCw" crossorigin="anonymous"></script>
  <!-- <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css"> -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div id="header" class="container-fluid text-center">
        <div><h1>NHL Playoffs Center</h1></div>
        <div></div><p>Welcome to the NHL Playoffs Center</p></div>
        <div class=" container-fluid text-center">
            <div class="nav row">
                <div class="col">
                    <a href="/">Scores</a>
                </div>
                <div class="col">
                    <a href="stats">Stats</a>
                </div>
                <div class="col">
                    <a href="/nhl_scores">Schedule</a>
                </div>
            </div>
        </div>
    </div>
    <div id="nhlscorescontainer" class="container-fluid vw-100 justify-content-between  text-center" >
        <div id="sectionHeader">
            <h3>Hockey Playoff Scores</h3>
        </div>
        <div id="nhlscorestablessection" class="container-fluid">
            <div id="dateselect">
                <select id="nhlScoreDateSelect" name="nhlScoreDateSelect" hx-get="/nhl_scores" hx-target="#nhlScores" hx-trigger="change">
                    <option value="">Select a Game Date</option>
                </select>
                <!-- Add NHL Teams Select List.-->
            </div>
            <div id="nhlscorestable" class="container-fluid">
                <div class="row" id="nhlScores"  hx-swap="innerHTML" >

                </div>

            </div>
        </div>
    </div>




    <!-- <script src="https://jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script> -->
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', () => {
            // get an instance of the select element
            const nhlScoreDateSelect = document.getElementById('nhlScoreDateSelect');
            // create options elements for dates starting from April 18, 2026 to May 26, 2026
            const startDate = new Date('2026-04-18');
            const endDate = new Date('2026-05-26');
            for (let date = startDate; date <= endDate; date.setDate(date.getDate() + 1)) {
                const option = document.createElement('option');
                option.value = date.toISOString().split('T')[0]; // format date as YYYY-MM-DD
                option.textContent = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }); // format date as "Month Day, Year"
                nhlScoreDateSelect.appendChild(option);
            }
        });


    </script>
</body>
</html>
