<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastAPI + HTMX</title>
  <script src="https://unpkg.com/htmx.org@2.0.0" integrity="sha384-wS5l5IKJBvK6sPTKa2WZ1js3d947pvWXbPJ1OmWfEuxLgeHcEbjUUA5i9V5ZkpCw" crossorigin="anonymous"></script>
  <!-- <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css"> -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div id="header" class="container-fluid text-center">
        <div><h1>NHL Playoffs Center</h1></div>
        <div></div><p>Welcome to the NHL Playoffs Center</p></div>
        <div class=" container-fluid text-center">
            <div class="nav row">
                <div class="col">
                    <a href="/">Scores</a>
                </div>
                <div class="col">
                    <a href="/nhl_scores">Stats</a>
                </div>
                <div class="col">
                    <a href="/nhl_scores">Schedule</a>
                </div>
            </div>
        </div>
    </div>
    <div id="nhlscorescontainer" class="container-fluid vw-100 justify-content-between  text-center" >
        <div id="sectionHeader">
            <h3>Hockey Playoff Scores</h3>
        </div>
        <div id="nhlscorestablessection" class="container-fluid">
            <div id="dateselect">
                <select id="nhlScoreDateSelect" name="nhlScoreDateSelect" hx-get="/nhl_scores" hx-target="#nhlScores" hx-trigger="change">
                    <option value="">Select a Game Date</option>
                    <option value="2026-04-18">April 18, 2026</option>
                    <option value="2026-04-19">April 19, 2026</option>
                    <option value="2026-04-20">April 20, 2026</option>
                    <option value="2026-04-21">April 21, 2026</option>
                    <option value="2026-04-22">April 22, 2026</option>
                    <option value="2026-04-23">April 23, 2026</option>
                    <option value="2026-04-24">April 24, 2026</option>
                    <option value="2026-04-25">April 25, 2026</option>
                    <option value="2026-04-26">April 26, 2026</option>
                    <option value="2026-04-27">April 27, 2026</option>
                    <option value="2026-04-28">April 28, 2026</option>
                    <option value="2026-04-29">April 29, 2026</option>
                    <option value="2026-04-30">April 30, 2026</option>
                    <option value="2026-05-01">May 1, 2026</option>
                    <option value="2026-05-02">May 2, 2026</option>
                    <option value="2026-05-03">May 3, 2026</option>
                    <option value="2026-05-04">May 4, 2026</option>
                    <option value="2026-05-05">May 5, 2026</option> 
                    <option value="2026-05-06">May 6, 2026</option>
                    <option value="2026-05-07">May 7, 2026</option>
                    <option value="2026-05-08">May 8, 2026</option>
                    <option value="2026-05-09">May 9, 2026</option>
                    <option value="2026-05-10">May 10, 2026</option>
                    <option value="2026-05-11">May 11, 2026</option>    
                    <option value="2026-05-12">May 12, 2026</option>
                    <option value="2026-05-13">May 13, 2026</option>
                    <option value="2026-05-14">May 14, 2026</option>
                    <option value="2026-05-15">May 15, 2026</option>
                </select>
                <!-- Add NHL Teams Select List.-->
            </div>
            <div id="nhlscorestable" class="container-fluid">
                <div class="row" id="nhlScores"  hx-swap="innerHTML" >
                    
                </div>
                
            </div>
        </div>
    </div>

</body>
</html>
