name: Reusable Rebuild Caches
on:
    workflow_call:
        inputs:
            cache_precommit:
                required: false
                type: boolean
                default: true
            install_dev_deps:
                required: false
                type: boolean
                default: false
            python-version:
                description: "Python version to test against. Currently, this only supports one version per workflow run."
                required: false
                type: string
                default: "3.12"
    workflow_dispatch:
permissions:
    contents: read

jobs:
  rebuild-caches:
    name: Local Cache Rebuild
    runs-on: ubuntu-latest
    steps:
      - id: checkout
      #- name: Checkout code
        uses: actions/checkout@v3
      #- id: setup-python
      #  uses: actions/setup-python@v4
      #  with:
      #    python-version: ${{ inputs.python-version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Debug uv
        run: |
            which uv
            uv --version
      - name: Install dependencies
        run: |
          uv sync --locked
          uv sync --dev
        
      - id: install-dev-dependencies
        if: ${{ inputs.cache_precommit }}
        name: Install dev dependencies
        run: |
          uv sync --locked
          which uv
          uv --version
          uv sync --all-extras --dev
          uv tool install poethepoet
          uv tool install pre-commit --with pre-commit-uv

      - id: pre-commit
        if: ${{ inputs.cache_precommit }}
        name: Run pre-commit checks
        run: uv run pre-commit install-hooks

      - id: save-pre-commit-cache
        if: ${{ inputs.cache_precommit }}
        name: Save pre-commit cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
