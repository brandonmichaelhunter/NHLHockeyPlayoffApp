name: API - CD - Deploy to Production

# triggers
on:
  workflow_call:
  workflow_dispatch: # This enables manual runs
permissions:
  contents: read

jobs:

  deploy-api-production:
    name: Deploy API To Production

    runs-on: ubuntu-latest
    environment: NHLHockeyAppEnv
    permissions:
      contents: read

    steps:
      - run: echo "This is where we will deploy the API to production. This job will be called from the main pipeline workflow after the health check job, and it will be responsible for deploying the API to production if all previous steps in the pipeline have succeeded."

    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
      DOCKER_BUILDKIT: 1
