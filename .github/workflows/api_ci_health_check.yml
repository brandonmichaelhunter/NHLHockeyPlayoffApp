name: API - CI - Health Check

# triggers
on:
  workflow_call:
  workflow_dispatch: # This enables manual runs
permissions:
  contents: read

jobs:

  api-health-check:
    name: APIHealth Check
    runs-on: ubuntu-latest
    environment: NHLHockeyAppEnv
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version-file: "pyproject.toml"

    - name: Docker Login/Push
      uses: docker/login-action@v3
      with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull image from GHCR
      run: docker pull ghcr.io/${{ github.actor }}/nhlplayoffappv${{ github.sha}}:latest
    - name: Execute Image
      run: |
          docker run -d -p 8000:8000 ghcr.io/${{ github.actor }}/nhlplayoffappv${{ github.sha}}:latest
          # Wait for the API to be ready
          sleep 5
    - name: API Health Check
      run: |
        STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health/live)
        if [ "$STATUS_CODE" -ne 200 ]; then
            echo "The request failed with status: $STATUS_CODE"
            exit 1
        else
            echo "The request was sucessfull with status: $STATUS_CODE"
        fi
    - name: DB Connection Heatlh Check
      run: |
        RESPONSE=$(curl -s http://localhost:8000/health/ready)
        if ["$RESPONSE" -ne "Database connection successful"]; then
           echo "Database connection was unccessful"
           exit 1
        fi


    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
      DOCKER_BUILDKIT: 1
