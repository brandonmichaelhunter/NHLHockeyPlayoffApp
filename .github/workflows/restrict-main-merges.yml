name: Restrict Merges to main branch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  pull-requests: write

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is 'features'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "PR Source Branch ${{ github.head_ref }}"
          if [ "${{ github.head_ref }}" != "features" ]; then
            echo "ERROR: Only the 'features' branch is allowed to merge to the main branch."
            gh pr comment "${{ github.event.pull_request.number }}" --body "❌ Only the \`features\` branch is allowed to merge into \`main\`. Current source branch: \`${{ github.head_ref }}\`."
            exit 1
          fi
          echo "Success: Source branch is valid"
