name: Require Pull Request Labels
on:
  pull_request:
    types: [opened, edited, closed, assigned, reopened, unlabeled]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types:
      - edited
      - submitted
  #pull_request_target:
  #  branches:
  #    - features

jobs:
  validate:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Debug PR Number
        run: echo "PR Number ${{ github.event.pull_request.number || github.event.issue.number }}"
      - name: Set PR Number
        run: echo "pr_number=${{ github.event.pull_request.number || github.event.issue.number }}"
      - name: 🏷 Verify PR has a valid label
        uses: klaasnicolaas/action-pr-labels@v3.1.1
        id: labels
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number || github.event.issue.number }}
          valid-labels: >-
            hotfix, bug, documentation, feature, testing, workflows,data,infrastructure,refactor
          invalid-labels: >-
            duplicate, invalid
      - name: 🔍 Display validation results
        run: |
          echo "Valid: ${{ steps.labels.outputs.is-valid }}"
          echo "Valid labels: ${{ steps.labels.outputs.valid-labels-found }}"
          echo "Invalid labels: ${{ steps.labels.outputs.invalid-labels-found }}"
        continue-on-error: true
      - name: Add needs label when missing required label
        if: ${{ steps.labels.outputs.is-valid == 'false'}}
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ github.token }}
          labels: needslabel

      - name: Comment on PR when label is missing or invalid
        if: ${{ steps.labels.outputs.is-valid == 'false' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                "⚠️ This pull request is missing a valid label.",
                "",
                "Please add exactly one of the allowed labels:",
                "- hotfix",
                "- bug",
                "- documentation",
                "- feature",
                "- testing",
                "- workflows",
                "- data",
                "- infrastructure",
                "- refactor"
              ].join("\n")
            })
