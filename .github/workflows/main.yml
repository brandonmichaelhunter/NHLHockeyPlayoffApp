# My first workflow
name: NHL Playoff App - FastAPI Docker Build and Push to Azure AKS

# triggers
on: 
  push:
    branches:
      - beetle

# Jobs
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Docker Login/Push
      uses: docker/login-action@v3
      with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GH_DOCKER_ACCESS_TOKEN }}
    
    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        file: ./apps/Dockerfile
        push: true
        tags: bhunter/nhlplayoffappv1:latest

    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
      DOCKER_BUILDKIT: 1
