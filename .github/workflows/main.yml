# My first workflow
name: NHL Playoff App - FastAPI Docker Build and Push to Azure AKS

# triggers
on: 
  push:
    branches:
      - beetle

# Jobs
jobs:
  build-example:
    runs-on: ubuntu-latest
    environment: NHLHockeyAppEnv
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Docker Login/Push
      uses: docker/login-action@v3
      with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.actor }}/nhlplayoffappv1:latest
      
    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        file: ./apps/Dockerfile
        push: true
        tags: ghcr.io/${{ github.actor }}/nhlplayoffappv1:latest
    
    - name: Pull image from GHCR
      run: docker pull ghcr.io/${{ github.actor }}/nhlplayoffappv1:latest
    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
      DOCKER_BUILDKIT: 1
