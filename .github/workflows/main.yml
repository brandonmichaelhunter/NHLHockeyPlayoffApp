# My first workflow
name: NHL Playoff App - FastAPI Docker Build and Push to Azure AKS

# triggers
on: 
  push:
    branches:
      - beetle

# Jobs
jobs:
  build-api-docker:
    runs-on: ubuntu-latest
    environment: NHLHockeyAppEnv
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Docker Login/Push
      uses: docker/login-action@v3
      with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.actor }}/nhlplayoffappv1:latest
      
    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        file: ./apps/Dockerfile
        push: true
        tags: ghcr.io/${{ github.actor }}/nhlplayoffappv1:latest
    

  unit-test-api:
    needs: build-api-docker
    runs-on: ubuntu-latest
    environment: NHLHockeyAppEnv
    permissions:
      contents: read
      packages: write
    steps:
    - name: Run API Unit Tests
      run: pytest ./apps/api/tests/unit_tests/test_main_unit.py
  
  health-checker:
    needs: unit-test-api # This makes 'test' wait for 'build'
    runs-on: ubuntu-latest
    environment: NHLHockeyAppEnv
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: Pull image from GHCR
      run: docker pull ghcr.io/${{ github.actor }}/nhlplayoffappv1:latest
    - name: Execute Image
      run: |
          docker run -d -p 8000:8000 ghcr.io/${{ github.actor }}/nhlplayoffappv1:latest
          # Wait for the API to be ready
          sleep 5 
    - name: API Health Check
      run: |
        STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health/live)
        if [ "$STATUS_CODE" -ne 200 ]; then
            echo "The request failed with status: $STATUS_CODE"
            exit 1
        else
            echo "The request was sucessfull with status: $STATUS_CODE"
        fi
    - name: DB Connection Heatlh Check
      run: |
        RESPONSE=$(curl -s http://localhost:8000/health/ready)
        if ["$RESPONSE" -ne "Database connection successful"]; then
           echo "Database connection was unccessful"
           exit 1
        fi


    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
      DOCKER_BUILDKIT: 1
