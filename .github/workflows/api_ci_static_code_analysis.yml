name: API CI - Code Analyzer and Dependency Checker


on:
  push: # Only run on pushes to the beetle branch, when changes are made to the API code base or the pre-commit-config.yaml file.
    branches: [beetle]
    paths:
      - 'src/api/**'
      - 'tests/api/**'
      - '.pre-commit-config.yaml'

  pull_request: # Only run on PRs targeting the beetle branch, when changes are made to the API code base or the pre-commit-config.yaml file.
    branches: [beetle]
    types: [opened, synchronize, reopened]
    paths:
      - 'src/api/**'
      - 'tests/api/**'
      - '.pre-commit-config.yaml'

  workflow_dispatch: # This enables manual runs


permissions:
  contents: read
  pull-requests: write

jobs:
  rebuild-caches:
    uses: brandonmichaelhunter/NHLHockeyPlayoffApp/.github/workflows/reusable-rebuild-caches.yml@beetle
    with:
      cache_precommit: true

  pre-commit:
    name: Run pre-commit and comment on failure
    needs: rebuild-caches
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Run pre-commit
        id: precommit
        shell: bash
        run: |
          set +e
          uv run pre-commit run --all-files 2>&1 | tee precommit-output.txt
          exit_code=${PIPESTATUS[0]}
          {
            echo "exit_code=$exit_code"
            echo "output<<EOF"
            cat precommit-output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0
      # If pre-commit fails, make a comment on the current PR with the output of the pre-commit command.
      # Limit the output to 60000 characters to avoid hitting GitHub's comment size limit.
      - name: Comment on PR if pre-commit failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PRECOMMIT_OUTPUT: ${{ steps.precommit.outputs.output }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              "## pre-commit failed",
              "",
              "```text",
              (process.env.PRECOMMIT_OUTPUT || "No pre-commit output captured").slice(0, 60000),
              "```"
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      # Run pip-audit to check for any vulnerable dependencies in the API code base.
      - name: Generate timestamp
        id: timestamp
        run: echo "report_time=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Run pip-audit and save to file
        id: audit
        run: |
          set +e
          FILENAME="pip-audit-report-${{ steps.timestamp.outputs.report_time }}.md"
          uv run pip-audit --output $FILENAME --format markdown
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0
          
      - name: Read pip-audit report
        id: audit_report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const filename = "${{ steps.audit.outputs.filename }}";
            const report = fs.readFileSync(filename, 'utf8');
            core.setOutput('report', report);
          result-encoding: string

      - name: Comment on PR with pip-audit results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.audit_report.outputs.report }}`;
            if (report.trim() === 'No vulnerabilities found') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ `pip-audit` found no vulnerabilities.'
              });
            } else {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `
                  ### 🚨 Pip-audit Vulnerability Report

                  *Report generated at: ${{ steps.timestamp.outputs.report_time }}*


                  ${report}
                `
              });
            }
        env:
          AUDIT_REPORT: ${{ steps.audit_report.outputs.report }}
