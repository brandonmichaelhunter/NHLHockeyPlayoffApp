name: API CI - Integration Tests
on:
  workflow_run:
    workflows: ["API CI - Code Analyzer and Dependency Checker", "API CI - Unit Tests"]
    types:
      - completed
env:
  PYTHON_VERSION: '3.13'
jobs:
  rebuild-caches:
    uses: brandonmichaelhunter/NHLHockeyPlayoffApp/.github/workflows/reusable-rebuild-caches.yml@beetle
    with:
      install_dev_deps: true
      python-version: 3.13

  integration-test-api:
    needs: rebuild-caches
    runs-on: ubuntu-latest
    environment: NHLHockeyAppEnv
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version-file: "pyproject.toml"

    # - name: Install uv
    #   uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    # - name: Install UV dev dependencies
    #   run: uv sync --locked && uv sync --all-extras --dev && uv tool install poethepoet

    - name: Run API Integration Tests
      run: uv run poe integration_test
