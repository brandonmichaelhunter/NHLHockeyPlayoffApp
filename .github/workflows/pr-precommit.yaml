name: PR Pre-commit
on: 
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write


jobs:
  pre-commit:
   name: Run pre-commit and comment on failure
   runs-on: ubuntu-latest

   steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        
      #- name: Install uv
      #  uses: astral-sh/setup-uv@v4

      #- name: Install dependencies
      #  run: uv sync --dev
      - id: install-dev-dependencies
        name: Install dev dependencies
        run: |
          uv sync --locked
          which uv
          uv --version
          uv sync --all-extras --dev
          uv tool install poethepoet
          uv tool install pre-commit --with pre-commit-uv

      - id: pre-commit
        name: Run pre-commit checks
        run: uv run pre-commit install-hooks
        
      - name: Run pre-commit
        id: precommit
        shell: bash
        run: |
          set +e
          uv run pre-commit run --all-files 2>&1 | tee precommit-output.txt
          exit_code=${PIPESTATUS[0]}
          {
            echo "exit_code=$exit_code"
            echo "output<<EOF"
            cat precommit-output.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          

      - name: Comment on PR if pre-commit failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PRECOMMIT_OUTPUT: ${{ steps.precommit.outputs.output }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              "## pre-commit failed",
              "",
              "```text",
              (process.env.PRECOMMIT_OUTPUT || "No pre-commit output captured").slice(0, 60000),
              "```"
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
